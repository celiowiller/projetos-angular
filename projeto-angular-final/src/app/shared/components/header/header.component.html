<mat-toolbar color="primary" class="toolbar">

  <!-- Logo -->
  <span class="logo" routerLink="/cardapio">
    ☕ Café App
  </span>

  <!-- Espaçador -->
  <span class="spacer"></span>

  <!-- Links públicos -->
  <button mat-button routerLink="/home">Home</button>
  <button mat-button routerLink="/cardapio">Cardápio</button>

  @if (!isAutenticado()) {

    <button mat-button routerLink="/login">
      <mat-icon>login</mat-icon>
      Login
    </button>

    <button mat-button routerLink="/cadastro">
      <mat-icon>person_add</mat-icon>
      Cadastro
    </button>

  }

  @if (isAutenticado()) {

    <button mat-button routerLink="/perfil/meus-pedidos">
      <mat-icon>receipt_long</mat-icon>
      Pedidos
    </button>

    <button mat-button routerLink="/perfil/checkout">
      <mat-icon>shopping_cart</mat-icon>
      ({{ quantidadeCarrinho() }})
    </button>

    @if (isAdmin()) {
      <button mat-button routerLink="/admin/painel">
        <mat-icon>admin_panel_settings</mat-icon>
        Admin
      </button>
    }

    <span class="usuario">
      Ola, {{ usuario()?.nome }}, bem vindo!
    </span>

    <button mat-button color="warn" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sair
    </button>

  }

</mat-toolbar>
